<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TurfBooking Code Reference PDF</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Poppins, Arial, sans-serif;
      background: linear-gradient(135deg, #f8fafc 0%, #eef2ff 50%, #f3f4f6 100%);
      color: #18223f;
    }
    .card {
      width: min(560px, calc(100vw - 32px));
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.88);
      box-shadow: 0 18px 35px rgba(20, 32, 89, 0.12);
      padding: 28px;
      box-sizing: border-box;
      border: 1px solid rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(14px);
    }
    h1 { margin: 0 0 10px; font-size: 28px; }
    p { margin: 0 0 18px; line-height: 1.6; color: #44506a; }
    a.button {
      display: inline-block;
      text-decoration: none;
      border-radius: 16px;
      background: linear-gradient(180deg, #16213d 0%, #0f1830 100%);
      color: #fff;
      padding: 14px 22px;
      font-weight: 600;
      box-shadow: 0 16px 28px rgba(15, 24, 48, 0.28);
    }
    code { background: #eef2ff; padding: 2px 6px; border-radius: 8px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Code Reference PDF</h1>
    <p>This page gives you a direct download button for the generated project code PDF.</p>
    <p>File: <code>docs/project-code-reference.pdf</code></p>
    <a class="button" href="./project-code-reference.pdf" download>Download PDF</a>
  </div>
</body>
</html>
